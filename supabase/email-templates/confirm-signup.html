<!--
  Supabase → Authentication → Email Templates → Confirm signup
  Paste the full file. href must use: {{ .ConfirmationURL }}
  (Some wording/CSS in richer templates may be blocked by provider filters — this lean version is editor-safe.)
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Confirm your email — REELS MARKET</title>
</head>
<body style="margin:0;padding:0;background-color:#02040a;font-family:sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#02040a;">
    <tr>
      <td align="center" style="padding:40px 10px;">
        <table role="presentation" width="100%" style="max-width:500px;background-color:#070f1f;border:1px solid #00f2ea;border-radius:12px;">
          <tr>
            <td align="center" style="padding:30px 20px 10px;">
              <div style="font-size:24px;font-weight:bold;color:#f8fafc;letter-spacing:1px;">
                REELS <span style="color:#00f2ea;">MARKET</span>
              </div>
              <div style="font-size:12px;color:#64748b;margin-top:5px;letter-spacing:2px;">Digital DNA</div>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:20px 30px;">
              <h1 style="font-size:24px;color:#f8fafc;margin:0;">Welcome aboard!</h1>
              <p style="font-size:15px;line-height:1.6;color:#cbd5e1;margin-top:15px;">
                Thank you for joining REELS MARKET. <br>Please verify your email to get started.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:20px 30px 40px;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td align="center" bgcolor="#00f2ea" style="border-radius:30px;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:15px 35px;color:#02040a;text-decoration:none;font-weight:bold;font-size:16px;">
                      Verify Email
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin-top:25px;font-size:11px;color:#475569;word-break:break-all;">
                If the button doesn't work, copy and paste the link below:<br>
                <span style="color:#00f2ea;">{{ .ConfirmationURL }}</span>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
